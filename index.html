<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auditoría</title>

<style>
body{font-family:Arial;background:#f4f4f4;margin:0;padding:10px}
.header{background:#111;color:#fff;text-align:center;padding:20px}
.box{background:#fff;padding:15px;margin:10px 0;border-radius:10px}
.score{font-size:50px;text-align:center;font-weight:bold}
button{width:100%;padding:10px;margin-top:5px}
.item{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #eee}
</style>
</head>

<body>

<div class="header">
<h2>CHEF MAURICIO MARÍN</h2>
</div>

<div class="box">
<h3>Puntaje</h3>
<div class="score" id="score">100</div>
</div>

<div class="box">
<input id="nombre" placeholder="Nombre" style="width:100%;padding:8px"><br><br>
<input id="fecha" type="date" style="width:100%;padding:8px">
</div>

<div class="box">

<div class="item">
<span>Fachada sucia</span>
<input type="checkbox" class="chk" data-pts="5">
</div>

<div class="item">
<span>Mesas sucias</span>
<input type="checkbox" class="chk" data-pts="5">
</div>

<div class="item">
<span>Grasa en cocina</span>
<input type="checkbox" class="chk" data-pts="10">
</div>

</div>

<div class="box">
<button onclick="pdf()">PDF</button>
<button onclick="excel()">EXCEL</button>
<button onclick="wa()">WHATSAPP</button>
</div>

<script>

let checks=document.querySelectorAll(".chk");
let score=document.getElementById("score");

checks.forEach(c=>{
c.addEventListener("change",()=>{
let total=100;
checks.forEach(x=>{
if(x.checked){total-=parseInt(x.dataset.pts)}
});
score.innerText=total;
});
});

function pdf(){
alert("PDF listo (modo demo funcionando)");
}

function excel(){
alert("Excel listo (modo demo funcionando)");
}

function wa(){
let msg="Auditoria Puntaje: "+score.innerText;
window.open("https://wa.me/573117700431?text="+encodeURIComponent(msg));
}

</script>

</body>
</html>
